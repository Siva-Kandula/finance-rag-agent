# Agent Configuration for Financial RAG Pipeline

agent:
  llm_model: "gpt-4-turbo"
  max_retries: 3
  temperature: 0.1
  system_prompt: >
    You are an expert financial analyst. Answer questions strictly based 
    on the provided context. Enforce citations for every claim.

retrieval:
  dense_model: "BAAI/bge-large-en-v1.5"
  reranker_model: "cross-encoder/ms-marco-MiniLM-L-6-v2"
  vector_db_uri: "pinecone://us-west1-gcp/finance-index"
  top_k: 5
  hybrid_alpha: 0.7  # 0.7 dense, 0.3 sparse
  chunk_size: 512
  chunk_overlap: 50

evaluation:
  eval_model: "gpt-4"
  metrics:
    - faithfulness
    - answer_relevance
    - context_recall
